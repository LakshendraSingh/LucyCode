<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lucy Code Mobile</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent-glow: rgba(88, 166, 255, 0.15);
    --success: #3fb950;
    --error: #f85149;
    --warning: #d29922;
    --user-bubble: #1f6feb;
    --assistant-bubble: #1c2128;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --mono: 'JetBrains Mono', 'Fira Code', 'Menlo', monospace;
}

body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* --- Header --- */
.header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
}

.header-title {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
}

.header-title .icon { font-size: 20px; }

.status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--error);
    transition: background 0.3s;
}
.status-dot.connected { background: var(--success); }

/* --- Messages --- */
.messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
}

.message {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    animation: fadeIn 0.3s ease;
    word-wrap: break-word;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

.message.user {
    align-self: flex-end;
    background: var(--user-bubble);
    border-bottom-right-radius: 4px;
}

.message.assistant {
    align-self: flex-start;
    background: var(--assistant-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
}

.message.system {
    align-self: center;
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    padding: 4px 8px;
}

.message pre {
    background: rgba(0,0,0,0.3);
    border-radius: 8px;
    padding: 8px 10px;
    margin: 8px 0;
    overflow-x: auto;
    font-family: var(--mono);
    font-size: 12px;
}

.message code {
    font-family: var(--mono);
    background: rgba(255,255,255,0.1);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 12px;
}

.thinking-indicator {
    display: flex;
    gap: 4px;
    padding: 8px 0;
}

.thinking-indicator span {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.4s infinite;
}
.thinking-indicator span:nth-child(2) { animation-delay: 0.2s; }
.thinking-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
    40% { transform: scale(1); opacity: 1; }
}

/* --- Input --- */
.input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
}

.input-area textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    padding: 10px 16px;
    resize: none;
    max-height: 120px;
    min-height: 40px;
    outline: none;
    transition: border-color 0.2s;
}
.input-area textarea:focus { border-color: var(--accent); }
.input-area textarea::placeholder { color: var(--text-dim); }

.send-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s, opacity 0.2s;
    flex-shrink: 0;
}
.send-btn:active { transform: scale(0.9); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* --- Toolbar --- */
.toolbar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 6px 16px;
    display: flex;
    justify-content: space-around;
    flex-shrink: 0;
}

.toolbar button {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 11px;
    cursor: pointer;
    padding: 4px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
}

.toolbar button .tb-icon { font-size: 18px; }
.toolbar button:hover { color: var(--accent); }
</style>
</head>
<body>

<div class="header">
    <div class="header-title">
        <span class="icon">⚡</span>
        Lucy Code
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
        <span id="statusText" style="font-size:12px;color:var(--text-dim);">Disconnected</span>
        <div id="statusDot" class="status-dot"></div>
    </div>
</div>

<div id="messages" class="messages">
    <div class="message system">Scan QR code to connect</div>
</div>

<div class="input-area">
    <textarea id="input" placeholder="Ask Lucy Code..." rows="1"
        oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
</div>

<div class="toolbar">
    <button onclick="clearChat()">
        <span class="tb-icon">🗑</span>Clear
    </button>
    <button onclick="reconnect()">
        <span class="tb-icon">🔄</span>Reconnect
    </button>
    <button onclick="showTools()">
        <span class="tb-icon">🔧</span>Tools
    </button>
    <button onclick="showStatus()">
        <span class="tb-icon">ℹ️</span>Status
    </button>
</div>

<script>
let ws = null;
let msgId = 0;
let config = {};

// Parse config from URL params or QR payload
function parseConfig() {
    const params = new URLSearchParams(window.location.search);
    config.url = params.get('url') || 'ws://127.0.0.1:9847';
    config.token = params.get('token') || '';
    config.session = params.get('session') || '';

    // Also try hash fragment
    if (window.location.hash) {
        try {
            const decoded = JSON.parse(atob(window.location.hash.slice(1)));
            config.url = decoded.url || config.url;
            config.token = decoded.token || config.token;
            config.session = decoded.session || config.session;
        } catch(e) {}
    }
}

function connect() {
    parseConfig();
    addMessage('system', `Connecting to ${config.url}...`);

    try {
        // Use TCP-based approach: convert ws:// to direct connection
        ws = new WebSocket(config.url);

        ws.onopen = () => {
            setStatus(true);
            addMessage('system', 'Connected');

            if (config.token) {
                send('authenticate', { token: config.token });
            }
        };

        ws.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                handleResponse(msg);
            } catch(e) {}
        };

        ws.onclose = () => {
            setStatus(false);
            addMessage('system', 'Disconnected');
        };

        ws.onerror = () => {
            setStatus(false);
        };
    } catch(e) {
        addMessage('system', `Connection error: ${e.message}`);
    }
}

function setStatus(connected) {
    document.getElementById('statusDot').className = 'status-dot' + (connected ? ' connected' : '');
    document.getElementById('statusText').textContent = connected ? 'Connected' : 'Disconnected';
    document.getElementById('sendBtn').disabled = !connected;
}

function send(method, params = {}) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    msgId++;
    ws.send(JSON.stringify({ jsonrpc: '2.0', id: msgId, method, params }));
}

function handleResponse(msg) {
    if (msg.result) {
        if (msg.result.status === 'authenticated') {
            addMessage('system', '🔐 Authenticated');
        } else if (msg.result.response) {
            addMessage('assistant', msg.result.response);
        } else if (msg.result.tools) {
            const tools = msg.result.tools.map(t => `• ${t.name}: ${t.description}`).join('\n');
            addMessage('system', `Available tools:\n${tools}`);
        } else if (msg.result.pong) {
            addMessage('system', '🏓 Pong');
        }
    }
    if (msg.error) {
        addMessage('system', `⚠️ ${msg.error.message}`);
    }
    removeThinking();
}

function sendMessage() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text) return;

    addMessage('user', text);
    send('query', { prompt: text });
    showThinking();

    input.value = '';
    autoResize(input);
}

function addMessage(type, text) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${type}`;
    div.innerHTML = formatText(text);
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function formatText(text) {
    // Basic markdown rendering
    return text
        .replace(/```([\s\S]*?)```/g, '<pre>$1</pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
}

function showThinking() {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message assistant';
    div.id = 'thinking';
    div.innerHTML = '<div class="thinking-indicator"><span></span><span></span><span></span></div>';
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function removeThinking() {
    const el = document.getElementById('thinking');
    if (el) el.remove();
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function clearChat() {
    document.getElementById('messages').innerHTML = '<div class="message system">Chat cleared</div>';
}

function reconnect() {
    if (ws) ws.close();
    setTimeout(connect, 500);
}

function showTools() { send('list_tools'); }
function showStatus() { send('status'); }

// Keyboard
document.getElementById('input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

// Auto-connect
connect();
</script>
</body>
</html>
